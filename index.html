<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPTC</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <span id="pane-count">0 / 6</span>
    </div>
    <div id="shortcut-hints">
      <span><kbd>`+T</kbd> New</span>
      <span><kbd>`+W</kbd> Close</span>
      <span><kbd>`+1-6</kbd> Switch</span>
      <span><kbd>`+E</kbd> Theme</span>
      <span><kbd>Ctrl+`</kbd> Literal `</span>
    </div>
    <div id="toolbar-right"></div>
  </div>
  <div id="terminal-grid"></div>
  <script src="dist/renderer.js"></script>
</body>
</html>
